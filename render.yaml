# Render Blueprint for the Elemental Rescue web build.
# Hosts the Godot HTML5 export in ./web as a free static site.
# The cross-origin headers are REQUIRED: the Godot 4 web export is
# multi-threaded (SharedArrayBuffer), which browsers only allow on a
# cross-origin-isolated page.
services:
  - type: web
    name: elemental-rescue
    runtime: static
    buildCommand: "echo 'Static build already committed in ./web'"
    staticPublishPath: web
    headers:
      - path: /*
        name: Cross-Origin-Opener-Policy
        value: same-origin
      - path: /*
        name: Cross-Origin-Embedder-Policy
        value: require-corp
    routes:
      - type: rewrite
        source: /
        destination: /index.html

  # Dedicated authoritative game server for online multiplayer. A headless copy
  # of the game (Docker) that browser clients connect to over wss://.
  # NOTE: no healthCheckPath — Render's default TCP probe satisfies a WebSocket
  # server (Godot does not answer plain HTTP GET). Free tier sleeps after 15 min
  # idle (~1 min cold start on the first join); bump to a paid plan for always-on.
  - type: web
    name: elemental-rescue-server
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    autoDeploy: true
