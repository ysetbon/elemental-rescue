# Render Blueprint for the Elemental Rescue web build.
# Hosts the Godot HTML5 export in ./web as a free static site.
# The cross-origin headers are REQUIRED: the Godot 4 web export is
# multi-threaded (SharedArrayBuffer), which browsers only allow on a
# cross-origin-isolated page.
services:
  - type: web
    name: elemental-rescue
    runtime: static
    buildCommand: "echo 'Static build already committed in ./web'"
    staticPublishPath: web
    headers:
      - path: /*
        name: Cross-Origin-Opener-Policy
        value: same-origin
      - path: /*
        name: Cross-Origin-Embedder-Policy
        value: require-corp
    routes:
      - type: rewrite
        source: /
        destination: /index.html

  # Online-multiplayer relay (server.js). A tiny Node WebSocket relay — NO game
  # engine on the server. One player's browser is the HOST and runs the game; this
  # just shuttles messages between the host and the guests.
  # On the paid Starter plan ($7/mo): always-on (no 15-min sleep / cold start) and a
  # steady dedicated CPU, so the relay forwards friends' traffic with the lowest,
  # most consistent latency. (The relay is light — Free works too, but it sleeps and
  # cold-starts on the first connect.)
  - type: web
    name: elemental-rescue-server
    runtime: node
    plan: starter
    buildCommand: npm install --omit=dev
    startCommand: node server.js
    region: ohio   # US-East — keep where the friends/host already connect best
    autoDeploy: true
